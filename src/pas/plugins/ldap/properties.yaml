factory: form
name: ldapsettings
props:
    action: expr:context.action
    class: edit-form enableFormTabbing enableUnloadProtection
widgets:
- server:
    factory: "*userpassanon:fieldset"
    props:
        legend: i18n:lbl_ldap_server_settings:LDAP Server Settings
        class: formPanel
    custom:
        userpassanon:
            extractors: context.userpassanon_extractor
    widgets:
    - uri:
        factory: '#field:text'
        value: expr:context.props.uri
        props:
            label: i18n:lbl_connection_uri:Connection URI
            help: i18n:help_connection_uri:Example, the protocol is ldap, the IP address 127.0.0.1 and the port 12345
            required: i18n:msg_connection_uri:No URI defined
    - anonymous:
        factory: '#field:checkbox'
        value: expr:context.anonymous
        default: False
        props:
            label: i18n:lbl_anonymous_connection:Anonymous Connection?
    - conn_timeout:
        factory: '#field:number'
        value: expr:context.props.conn_timeout
        props:
            label: i18n:lbl_ldap_connection_timeout_in_seconds:LDAP connection timeout in seconds
            datatype: integer
    - op_timeout:
        factory: '#field:number'
        value: expr:context.props.op_timeout
        props:
            label: i18n:lbl_ldap_operation_timeout_in_seconds:LDAP operation timeout in seconds
            datatype: integer
    - user:
        factory: '#field:text'
        value: expr:context.props.user
        props:
            label: i18n:lbl_manager_user:Manager User
    - password:
        factory: '#field:password'
        value: expr:context.props.password
        props:
            label: i18n:lbl_manager_password:Manager Password
    - ignore_cert:
        factory: '#field:checkbox'
        value: expr:context.props.ignore_cert
        props:
            label: i18n:lbl_ignore_certificate_check:Ignore certificate check?
            help: i18n:help_ignore_certificate_check:If set on authenticate a failing certificate chain check including CA is ignored.
    - page_size:
        factory: '#field:number'
        value: expr:context.props.page_size
        props:
            label: i18n:lbl_page_size:Page Size
            help: i18n:help_page_size:Maximum page size, number of results to query the server at once for.
            datatype: integer
            min: 1
            required_message: i18n:msg_page_size:'Page size must be given.'
- users:
    factory: fieldset
    props:
        legend: i18n:lbl_users_settings:Users Settings
        class: formPanel
    widgets:
    - dn:
        factory: '#field:text'
        value: expr:context.users.baseDN
        props:
            label: i18n:lbl_users_container_dn:Users container DN
            required: i18n:msg_users_container_dn:No Users DN defined
    - scope:
        factory: '#field:select'
        value: expr:str(context.users.scope)
        props:
            label: i18n:lbl_users_search_scope:Users search scope
            vocabulary: expr:context.scope_vocab
    - query:
        factory: '#field:text'
        value: expr:context.users.queryFilter
        props:
            label: i18n:lbl_users_search_query_filter:Users search query filter
    - object_classes:
        factory: '#array'
        value: expr:context.users.objectClasses
        props:
            label: i18n:lbl_object_classes_for_user_creation:Object classes for User creation
            array.label: i18n:lbl_object_class:Object class
        widgets:
            - oc:
                factory: field:text
    - memberOfSupport:
        factory: '#field:checkbox'
        value: expr:context.users.memberOfSupport
        props:
            label: i18n:lbl_memberOf_attribute_supported:memberOf attribute supported?
    - recursiveGroups:
        factory: '#field:checkbox'
        value: expr:context.users.recursiveGroups
        props:
            label: i18n:lbl_support_recursive_nested_groups:Support recursive/nested groups?
            help: i18n:help_support_recursive_nested_groups:If your LDAP/AD supports it this will use LDAP_MATCHING_RULE_IN_CHAIN. By default only AD supports this.
    - memberOfExternalGroupDNs:
        factory: '#array'
        value: expr:context.users.memberOfExternalGroupDNs
        props:
            array.help: i18n:help_memberOf_external_allowed_group_dns:"Group DNs outside of the groups base DN are ignored, except if listed here"
            array.label: i18n:lbl_memberOf_external_allowed_group_dns:memberOf external allowed Group DNs
        widgets:
            - dn:
                factory: field:text
    - account_expiration:
        factory: '#field:checkbox'
        value: expr:context.users.account_expiration
        props:
            label: i18n:lbl_user_accounts_expires:User Accounts expires?
    - expires_attr:
        factory: '#field:text'
        value: expr:context.users.expiresAttr
        props:
            label: i18n:lbl_attribute_containing_expiration_time:Attribute containing expiration Time
    - expires_unit:
        factory: '#field:select'
        value: expr:context.users.expiresUnit
        props:
            label: i18n:lbl_account_expiration_unit:Account expiration unit
            vocabulary: expr:((0, 'Days since Epoch'), (1, 'Seconds since epoch'))
    - aliases_attrmap:
        factory: '#field:dict'
        value: expr:context.users_attrmap
        props:
            label: i18n:lbl_user_attribute_aliases:User attribute aliases
            required: i18n:msg_user_attribute_aliases:User attribute aliases values are mandatory
            static: True
            head:
                key: i18n:head_reserved_key:Reserved Key
                value: i18n:head_ldap_attribute:LDAP Attribute
    - propsheet_attrmap:
        factory: '#field:dict'
        value: expr:context.users_propsheet_attrmap
        props:
            label: i18n:lbl_user_property-sheet_attributes:User Property-Sheet Attributes
            head:
                key: i18n:head_name_on_sheet:Name on Sheet
                value: i18n:head_ldap_attribute:LDAP Attribute
- groups:
    factory: fieldset
    props:
        legend: i18n:lbl_groups_settings:Groups Settings
        class: formPanel
    widgets:
    - dn:
        factory: '#field:text'
        value: expr:context.groups.baseDN
        props:
            label: i18n:lbl_groups_container_dn:Groups container DN
            required: i18n:msg_groups_container_dn:No Groups DN defined
    - scope:
        factory: '#field:select'
        value: expr:str(context.groups.scope)
        props:
            label: i18n:lbl_groups_search_scope:Groups search scope
            vocabulary: expr:context.scope_vocab
    - query:
        factory: '#field:text'
        value: expr:context.groups.queryFilter
        props:
            label: i18n:lbl_groups_search_query_filter:Groups search query filter
    - object_classes:
        factory: '#array'
        value: expr:context.groups.objectClasses
        props:
            label: i18n:lbl_object_classes_for_groups:Object classes for Groups
            help: i18n:help_object_classes_for_groups:"One of those is mandatory like as one the following options groupOfNames, groupOfUniqueNames, posixGroup, group"
            array.label: i18n:lbl_object_class:Object class
        widgets:
            - oc:
                factory: field:text
    - memberOfSupport:
        factory: '#field:checkbox'
        value: expr:context.groups.memberOfSupport
        props:
            label: i18n:lbl_memberOf_attribute_supported:memberOf attribute supported?
    - aliases_attrmap:
        factory: '#field:dict'
        value: expr:context.groups_attrmap
        props:
            label: i18n:lbl_group_attribute_aliases:Group attribute aliases
            required: i18n:msg_group_attribute_aliases:Group attribute aliases values are mandatory
            static: True
            head:
                key: i18n:head_reserved_key:Reserved key
                value: i18n:head_ldap_attr_name:LDAP attr name
    - propsheet_attrmap:
        factory: '#field:dict'
        value: expr:context.groups_propsheet_attrmap
        props:
            label: i18n:lbl_group_property-sheet_attributes:Group Property-Sheet Attributes
            head:
                key: i18n:head_name_on_sheet:Name on Sheet
                value: i18n:head_ldap_attribute:LDAP Attribute
- cache:
    factory: fieldset
    props:
        legend: i18n:lbl_cache_settings:Cache Settings
        class: formPanel
    widgets:
    - cache:
        factory: '#field:checkbox'
        value: expr:context.props.cache
        props:
            label: i18n:lbl_cache_ldap_queries:Cache LDAP queries
    - memcached:
        factory: '#field:text'
        value: expr:context.props.memcached
        props:
            label: i18n:lbl_memcached_server_to_use:Memcached Server to use
            help: i18n:help_memcached_server_to_use:global - same server for all ldap plugins
            field.class: memcached field
            datatype: unicode
    - timeout:
        factory: '#field:number'
        value: expr:context.props.timeout
        props:
            label: i18n:lbl_cache_timeout_in_seconds:Cache timeout in seconds
            datatype: integer
- save:
    factory: submit
    props:
        action: save
        expression: True
        handler: context.save
        next: context.next
        label: i18n:lbl_save:Save
        class: submit-widget button-field context
